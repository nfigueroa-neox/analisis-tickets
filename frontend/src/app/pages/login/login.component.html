<div class="login-screen">
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <p>Ingresa tus credenciales para acceder al visor de horas</p>
    <div class="field">
      <label for="loginEmail">Email</label>
      <input
        id="loginEmail"
        type="email"
        [(ngModel)]="email"
        placeholder="usuario@ejemplo.com"
        (keydown.enter)="doLogin()"
      />
    </div>
    <div class="field">
      <label for="loginPassword">Contraseña</label>
      <input
        id="loginPassword"
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        (keydown.enter)="doLogin()"
      />
    </div>
    <button class="btn-login" (click)="doLogin()" [disabled]="loading">
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>
    <div
      class="login-error"
      [class.show]="!!error"
      [class.no-admin]="isNoAdmin"
    >
      {{ error }}
    </div>
  </div>
</div>
